version: '3.8'
services:
  postgres:
    image: postgres:18-alpine
    container_name: nodebase-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: nodebase_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: